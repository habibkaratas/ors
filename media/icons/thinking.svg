<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- game-icons "anvil-impact" 3 parçaya ayrıldı — Lorc, game-icons.net, CC BY 3.0.
       Kendi içinde CSS animasyonu: çekiç el pivotu (30,268) etrafında kalkıp örse iner,
       inişte kıvılcım çakar. <img> ile yüklenince animasyon çalışır. -->
  <style>
    .anvil, .spark, .hammer { fill: #6f8fb0; }
    .hammer {
      transform-box: view-box;
      transform-origin: 30px 268px;
      animation: ors-strike 0.85s ease-in-out infinite;
    }
    .spark { opacity: 0; animation: ors-spark 0.85s ease-in-out infinite; }
    @keyframes ors-strike {
      0%, 42%, 100% { transform: rotate(-17deg); }
      60% { transform: rotate(1deg); }
      76% { transform: rotate(-17deg); }
    }
    @keyframes ors-spark {
      0%, 50%, 80%, 100% { opacity: 0; }
      60%, 70% { opacity: 1; }
    }
  </style>
